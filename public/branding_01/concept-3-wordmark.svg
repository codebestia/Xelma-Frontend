<svg width="360" height="100" viewBox="0 0 360 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: Stellar Prism — Wordmark (logo + text) -->
  <g>
    <!-- Icon mark (scaled down) -->
    <rect width="80" height="80" rx="16" fill="#2C4BFD" y="10"/>
    <!-- Diamond -->
    <path d="M40 22 L62 50 L40 78 L18 50 Z" fill="white"/>
    <!-- X facets -->
    <line x1="28" y1="36" x2="52" y2="64" stroke="#2C4BFD" stroke-width="6" stroke-linecap="round"/>
    <line x1="52" y1="36" x2="28" y2="64" stroke="#2C4BFD" stroke-width="6" stroke-linecap="round"/>
    <!-- Inner diamond -->
    <path d="M40 40 L50 50 L40 60 L30 50 Z" fill="white" stroke="#2C4BFD" stroke-width="1.5"/>
  </g>
  <!-- Wordmark text -->
  <text x="100" y="64" font-family="'DM Sans', sans-serif" font-size="48" font-weight="700" fill="#292D32" letter-spacing="1">Xelma</text>
</svg>
