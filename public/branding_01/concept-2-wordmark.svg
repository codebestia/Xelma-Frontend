<svg width="360" height="100" viewBox="0 0 360 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 2: Token Cluster — Wordmark (logo + text) -->
  <g>
    <!-- Icon mark (scaled down) -->
    <rect width="80" height="80" rx="16" fill="#2C4BFD" y="10"/>
    <!-- Connecting lines -->
    <line x1="40" y1="50" x2="22" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="40" y1="50" x2="58" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="40" y1="50" x2="22" y2="68" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="40" y1="50" x2="58" y2="68" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Satellite nodes -->
    <circle cx="22" cy="32" r="5" fill="white"/>
    <circle cx="58" cy="32" r="5" fill="white"/>
    <circle cx="22" cy="68" r="5" fill="white"/>
    <circle cx="58" cy="68" r="5" fill="white"/>
    <!-- Center node -->
    <circle cx="40" cy="50" r="8" fill="white"/>
    <circle cx="40" cy="50" r="4" fill="#2C4BFD"/>
  </g>
  <!-- Wordmark text -->
  <text x="100" y="64" font-family="'DM Sans', sans-serif" font-size="48" font-weight="700" fill="#292D32" letter-spacing="1">Xelma</text>
</svg>
