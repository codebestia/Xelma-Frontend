<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 2: Token Cluster — Connected nodes in X pattern -->
  <rect width="512" height="512" rx="96" fill="#2C4BFD"/>
  <!-- Connecting lines from center to satellites -->
  <line x1="256" y1="256" x2="152" y2="152" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="256" x2="360" y2="152" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="256" x2="152" y2="360" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="256" x2="360" y2="360" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Cross-connections between adjacent satellites -->
  <line x1="152" y1="152" x2="360" y2="152" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="360" y1="152" x2="360" y2="360" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="360" y1="360" x2="152" y2="360" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="152" y1="360" x2="152" y2="152" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Satellite nodes (4 corners of X) -->
  <circle cx="152" cy="152" r="28" fill="white"/>
  <circle cx="360" cy="152" r="28" fill="white"/>
  <circle cx="152" cy="360" r="28" fill="white"/>
  <circle cx="360" cy="360" r="28" fill="white"/>
  <!-- Center node (larger) -->
  <circle cx="256" cy="256" r="44" fill="white"/>
  <!-- Inner accent on center node -->
  <circle cx="256" cy="256" r="20" fill="#2C4BFD"/>
</svg>
