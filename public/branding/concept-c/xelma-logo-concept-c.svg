<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradC" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2C4BFD"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#gradC)"/>
  <!-- Three network nodes forming upward triangle -->
  <!-- Connecting arcs between nodes -->
  <!-- Bottom-left to bottom-right -->
  <path d="M 148 370 Q 256 420, 364 370" stroke="white" stroke-width="8" fill="none" opacity="0.6"/>
  <!-- Bottom-left to top -->
  <path d="M 148 370 Q 170 230, 256 160" stroke="white" stroke-width="8" fill="none" opacity="0.6"/>
  <!-- Bottom-right to top -->
  <path d="M 364 370 Q 342 230, 256 160" stroke="white" stroke-width="8" fill="none" opacity="0.6"/>
  <!-- Node dots -->
  <!-- Top node (apex) -->
  <circle cx="256" cy="152" r="40" fill="white"/>
  <!-- Bottom-left node -->
  <circle cx="148" cy="370" r="34" fill="white" opacity="0.85"/>
  <!-- Bottom-right node -->
  <circle cx="364" cy="370" r="34" fill="white" opacity="0.85"/>
  <!-- Inner glow dots -->
  <circle cx="256" cy="152" r="18" fill="url(#gradC)"/>
  <circle cx="148" cy="370" r="15" fill="url(#gradC)"/>
  <circle cx="364" cy="370" r="15" fill="url(#gradC)"/>
</svg>
