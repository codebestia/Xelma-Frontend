<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradA" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2C4BFD"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <clipPath id="squircleClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  <!-- Squircle background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#gradA)"/>
  <!-- Stylized X formed by two crossing arcs -->
  <!-- Arc 1: top-left to bottom-right -->
  <path d="M 130 130 C 200 220, 312 292, 382 382" stroke="white" stroke-width="52" stroke-linecap="round" fill="none"/>
  <!-- Arc 2: top-right to bottom-left -->
  <path d="M 382 130 C 312 220, 200 292, 130 382" stroke="white" stroke-width="52" stroke-linecap="round" fill="none"/>
  <!-- Small token circle at center intersection -->
  <circle cx="256" cy="256" r="28" fill="white" opacity="0.9"/>
</svg>
